name: hax

on: [push, pull_request]

permissions:
  contents: read
  pull-requests: read

jobs:
  check-extraction-targets:
    name: Check libcrux extraction targets are up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@a81bbbf8298c0fa03ea29cdc473d45769f953675 # v4.1.1
        with:
          persist-credentials: false

      # dtolnay/rust-toolchain@30dc51db75d080812bc4a28ba3f342840b2e7dd7
      - uses: dtolnay/rust-toolchain@30dc51db75d080812bc4a28ba3f342840b2e7dd7
        with:
          toolchain: nightly

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Check libcrux extraction targets (warn only)
        run: |
          if ! make check-targets; then
            echo "::warning:: libcrux extraction targets may be out of date. Run 'make update-targets' in proofs/fstar/models"
          fi
        working-directory: securedrop-protocol/protocol-minimal

  verify:
    name: Extract and Verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@a81bbbf8298c0fa03ea29cdc473d45769f953675 # v4.1.1
        with:
          persist-credentials: false

      - name: Set up hax
        uses: hacspec/hax-actions@6c734302f9a0434cf590e0ba18c9dd9b28fc6659
        with:
          fstar: v2026.03.24 # keep in sync with "securedrop-protocol/protocol-minimal/Makefile"
          hax_reference: cargo-hax-v0.3.7 # keep in sync with "securedrop-protocol/protocol-minimal/Cargo.toml"

      - name: Extract F*
        run: make clean extract
        working-directory: securedrop-protocol/protocol-minimal

      - name: Confirm no diff from committed proofs
        run: git diff --exit-code .
        working-directory: securedrop-protocol/protocol-minimal/proofs

      - name: Type-check and verify
        run: make verify
        working-directory: securedrop-protocol/protocol-minimal

      - name: Libcrux extraction completes and is reproducible
        run: |
          make libcrux
          git diff --exit-code .
        working-directory: securedrop-protocol/protocol-minimal/proofs/fstar/models
